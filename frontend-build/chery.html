<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Chery Catalog</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(to bottom,#3a3a3a 0%, #9e9e9e 55%, #f2f2f2 100%);
    color:#111;
}

/* ===== HEADER ===== */
header{
    position:fixed;
    top:20px;
    width:100%;
    display:flex;
    justify-content:center;
    z-index:10;
}

.menu{
    display:flex;
    gap:36px;
    background:rgba(0,0,0,.25);
    backdrop-filter:blur(6px);
    padding:10px 28px;
    border-radius:30px;
}

.menu button{
    background:none;
    border:none;
    color:#eee;
    font-size:12px;
    letter-spacing:3px;
    cursor:pointer;
    padding-bottom:4px;
}

.menu button.active{
    border-bottom:2px solid #fff;
    color:#fff;
}

/* ===== CONTENT ===== */
main{
    padding-top:120px;
}

/* ===== ITEM ===== */
.item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:40px;
    padding:60px 8%;
    opacity:0;
    transform:translateX(-80px);
    transition:0.8s ease;
}

.item.right{
    flex-direction:row-reverse;
    transform:translateX(80px);
}

.item.show{
    opacity:1;
    transform:translateX(0);
}

/* IMAGE */
.car{
    flex:1;
    max-width:520px;
}

.car img{
    width:100%;
}

/* TEXT */
.info{
    flex:1;
    max-width:420px;
}

.info span{
    font-size:11px;
    letter-spacing:2px;
    color:#333;
}

.info h2{
    font-size:38px;
    margin:10px 0;
}

.info p{
    font-size:14px;
    line-height:1.7;
    color:#222;
}

/* ===== FOOTER ===== */
footer{
    position:relative;
    margin-top:80px;
    background:#111;
    color:#eee;
    padding:50px 8%;
}

.footer-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:40px;
}

.footer-grid h4{
    margin-bottom:14px;
    font-size:14px;
    letter-spacing:1px;
}

.footer-grid p{
    font-size:13px;
    color:#ccc;
    line-height:1.6;
}

.aftersales{
    display:inline-block;
    margin-top:10px;
    padding:8px 18px;
    border:1px solid #fff;
    border-radius:20px;
    font-size:12px;
    cursor:pointer;
}

.social i{
    margin-right:12px;
    font-size:18px;
    cursor:pointer;
}

.footer-bottom{
    margin-top:40px;
    padding-top:20px;
    border-top:1px solid rgba(255,255,255,.2);
    text-align:center;
    font-size:12px;
    color:#aaa;
}

/* ===== MOBILE ===== */
@media(max-width:900px){
    .item,
    .item.right{
        flex-direction:column;
        text-align:center;
        padding:40px 6%;
        transform:translateY(30px);
    }

    .item.show{
        transform:translateY(0);
    }

    .info h2{
        font-size:30px;
    }

    .footer-grid{
        grid-template-columns:1fr;
        text-align:center;
    }
}
</style>
</head>

<body>

<header>
    <div class="menu">
        <button class="active" onclick="render('bensin',this)">BENSIN</button>
        <button onclick="render('ev',this)">EV</button>
        <button onclick="render('hybrid',this)">HYBRID</button>
    </div>
</header>

<main id="content"></main>

<footer>
    <div class="footer-grid">
        <div>
            <h4>AFTERSALES</h4>
            <p>Dukungan layanan purna jual resmi Chery.</p>
            <div class="aftersales">AFTERSALES</div>
        </div>

        <div>
            <h4>CONTACT</h4>
            <p>Email: info@chery.co.id</p>
            <p>Phone: +62 812-3456-7890</p>
        </div>

        <div>
            <h4>FOLLOW US</h4>
            <div class="social">
                <i class="fab fa-instagram"></i>
                <i class="fab fa-github"></i>
                <i class="fab fa-linkedin"></i>
            </div>
        </div>
    </div>

    <div class="footer-bottom">
        © 2024 Endless Project — Chery Future Drive
    </div>
</footer>

<script>
/* ===== DATA ===== */
const vehicles={
    bensin:[
        {name:"OMODA 5",
        tag:"Future SUV",
        desc:"Desain futuristik dengan teknologi cerdas.",
        img:"https://img.pcauto.com/model/images/modelPic/my/chery-omoda-e5/424107811_1716264139601.png"},

        {name:"OMODA 5 Sport",
        tag:"Urban Performance",
        desc:"Tampilan sporty untuk gaya hidup modern.",
        img:"https://img.pcauto.com/model/images/modelPic/my/chery-omoda-e5/424107811_1716264139601.png"},
        
        {name:"OMODA 5 Pro",
        tag:"Premium Drive",
        desc:"Kenyamanan premium dengan desain elegan.",
        img:"https://img.pcauto.com/model/images/modelPic/my/chery-omoda-e5/424107811_1716264139601.png"}
    ],
    ev:[
        {name:"OMODA E5",
        tag:"Electric Drive",
        desc:"Mobil listrik ramah lingkungan.",
        img:"https://www.greenncap.com/wp-content/uploads/chery-omoda5-2024-0186.png"}
    ],
    hybrid:[
        {name:"TIGGO Hybrid",
        tag:"Smart Hybrid",
        desc:"Efisiensi optimal mesin bensin dan listrik.",
        img:"https://www.greenncap.com/wp-content/uploads/chery-omoda5-2024-0186.png"}
    ]
};

const content=document.getElementById("content");

function render(type,btn){
    content.innerHTML="";
    document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    vehicles[type].forEach((v,i)=>{
        const el=document.createElement("section");
        el.className="item"+(i%2 ? " right":"");
        el.innerHTML=`
            <div class="car"><img src="${v.img}"></div>
            <div class="info">
                <span>${v.tag}</span>
                <h2>${v.name}</h2>
                <p>${v.desc}</p>
            </div>`;
        content.appendChild(el);
    });

    observe();
}

function observe(){
    const items=document.querySelectorAll(".item");
    const obs=new IntersectionObserver(entries=>{
        entries.forEach(e=>{
            if(e.isIntersecting){
                e.target.classList.add("show");
            }
        });
    },{threshold:0.25});
    items.forEach(i=>obs.observe(i));
}

render("bensin",document.querySelector(".menu button"));
</script>

</body>
</html>
