<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar Template</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --accent:#2563eb;
  --danger:#dc2626;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;
  background:#f9fafb;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:260px;
  background:var(--bg);
  border-right:1px solid var(--border);
  position:fixed;
  inset:0 auto 0 0;
  padding:24px 16px;
  display:flex;
  flex-direction:column;
}

.brand{
  font-size:20px;
  font-weight:700;
  margin-bottom:24px;
  color:var(--text);
}

/* ===== MENU ===== */
.menu{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.menu a{
  text-decoration:none;
  color:var(--muted);
  padding:12px 14px;
  border-radius:10px;
  display:flex;
  align-items:center;
  gap:12px;
  transition:.2s;
  font-weight:500;
}

.menu a i{
  width:20px;
  text-align:center;
}

.menu a:hover{
  background:#f1f5f9;
  color:var(--text);
}

.menu a.active{
  background:rgba(37,99,235,.1);
  color:var(--accent);
  font-weight:600;
}

/* ===== PROFILE ===== */
.profile{
  border-top:1px solid var(--border);
  padding-top:16px;
}

.profile-name{
  font-weight:600;
  font-size:14px;
  margin-bottom:4px;
}

.profile-status{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  color:#16a34a;
  margin-bottom:12px;
}

.status-dot{
  width:8px;
  height:8px;
  background:#22c55e;
  border-radius:50%;
}

/* ===== LOGOUT ===== */
.logout{
  width:100%;
  border:none;
  background:rgba(220,38,38,.1);
  color:var(--danger);
  padding:10px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:.2s;
}

.logout:hover{
  background:rgba(220,38,38,.2);
}

/* ===== ROLE OWNER (optional) ===== */


/* ===== MOBILE ===== */
@media(max-width:768px){
  .sidebar{
    transform:translateX(-100%);
    transition:.3s;
    z-index:100;
  }
  .sidebar.show{
    transform:translateX(0);
  }
}
</style>
</head>

<body>

<aside class="sidebar" id="sidebar">
  <div class="brand">Service Dashboard</div>

  <nav class="menu">
    <a href="index.html" data-page="dashboard">
      <i class="fa-solid fa-gauge"></i> Home
    </a>
    <a href="https://wa.me/628888512596" target="_blank" data-page="whatsapp">
      <i class="fa-brands fa-whatsapp"></i> WhatsApp Chat
    </a>
    <a href="history.html" data-page="history">
      <i class="fa-regular fa-message"></i> Chat History
    </a>
    <a href="orderan.html" data-page="order">
      <i class="fa-solid fa-clipboard-list"></i> Order History
    </a>
    <a href="payment-history.html" data-page="payment-history">
      <i class="fa-solid fa-credit-card"></i> Payment History
    </a>
    <a href="estimasi_jasa.html" data-page="estimasi_jasa">
      <i class="fa-solid fa-wrench"></i> Service Estimation
    </a>
    <a href="sparepart.html" data-page="sparepart">
      <i class="fa-solid fa-magnifying-glass"></i> Sparepart Search
    </a>
    <a class="role-owner" href="reports.html" data-page="reports">
      <i class="fa-solid fa-chart-line"></i> Reports
    </a>
    <a class="role-owner" href="users.html" data-page="users">
      <i class="fa-solid fa-users"></i> User Management
    </a>
  </nav>

  <!-- PROFILE -->
  <div class="profile">
  <div id="sidebarUserName" class="profile-name">Guest</div> 
  <div class="profile-status">
    <span class="status-dot"></span> 
    <span class="role"><b id="user-role-display">Staff</b></span>
  </div>

</div>
    <button id="logoutBtn" class="logout">
      <i class="fa-solid fa-right-from-bracket"></i>
      Logout
    </button>
  </div>
</aside>

</body>
</html>
