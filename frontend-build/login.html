<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Endless Project</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        window.captchaToken = null;
        function onTurnstileSuccess(token) {
            window.captchaToken = token;
        }
    </script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
        }
        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>

<body class="h-full flex items-center justify-center p-6">
    <div class="login-card rounded-3xl p-8 w-full max-w-md">
        
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600/20 rounded-2xl mb-4">
                <i class="fa-solid fa-shield-halved text-blue-500 text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Endless Project</h1>
            <p class="text-slate-400 mt-2">Masuk untuk mengelola dashboard Anda</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-slate-300 text-sm font-semibold mb-2 ml-1">Nomor WhatsApp</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                        <i class="fa-solid fa-phone text-sm"></i>
                    </span>
                    <input type="text" id="phoneNumber" 
                           class="input-field w-full rounded-xl py-3.5 pl-11 pr-4 text-white placeholder-slate-500"
                           placeholder="08123456789" required>
                </div>
            </div>

            <div>
                <label class="block text-slate-300 text-sm font-semibold mb-2 ml-1">Kata Sandi</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                        <i class="fa-solid fa-lock text-sm"></i>
                    </span>
                    <input type="password" id="password" 
                           class="input-field w-full rounded-xl py-3.5 pl-11 pr-4 text-white placeholder-slate-500"
                           placeholder="••••••••" required>
                </div>
            </div>

            <div class="flex justify-center py-2">
                <div class="cf-turnstile" 
                     data-sitekey="0x4AAAAAACHMnsUfcqFy4Qot" 
                     data-callback="onTurnstileSuccess"
                     data-theme="dark">
                </div>
            </div>

            <button type="submit" 
                    class="btn-primary w-full text-white font-bold rounded-xl py-4 mt-2">
                Masuk Sekarang
            </button>
        </form>

        <div id="errorMessage" class="hidden mt-4 p-3 bg-red-500/10 border border-red-500/20 rounded-xl flex items-center gap-3 text-red-400 text-sm">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorText"></span>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-700/50 text-center">
            <p class="text-slate-400 text-sm">
                Belum punya akun? 
                <a href="register.html" class="text-blue-500 font-semibold hover:text-blue-400 transition-colors">
                    Daftar di sini
                </a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const errorContainer = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorContainer.classList.add('hidden');

            let phone = document.getElementById('phoneNumber').value;
            const password = document.getElementById('password').value;

            // Normalisasi nomor
            phone = phone.replace(/\D/g, '');
            if (phone.startsWith('0')) phone = '62' + phone.slice(1);

            // Validasi Captcha
            if (!window.captchaToken) {
                errorText.textContent = 'Silakan selesaikan CAPTCHA terlebih dahulu.';
                errorContainer.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        phone_number: phone,
                        password: password,
                        captcha_token: window.captchaToken
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorText.textContent = data.detail || 'Nomor HP atau password salah.';
                    errorContainer.classList.remove('hidden');
                    return;
                }

                // Simpan token dan redirect
                localStorage.setItem('authToken', data.access_token);
                window.location.href = 'index.html';

            } catch (err) {
                errorText.textContent = 'Terjadi kesalahan koneksi ke server.';
                errorContainer.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
