server {
    listen 80;
    server_name endlessproject.my.id www.endlessproject.my.id;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # PERHATIKAN BAGIAN INI DENGAN SEKSAMA
    location /api/ {
        # OPSI A: Jika di Python endpointnya @app.post("/api/login")
        # Gunakan ini (tanpa garis miring di akhir 8000):
        proxy_pass http://backend:8000; 

        # OPSI B: Jika di Python endpointnya @app.post("/login") 
        # Gunakan ini (ADA garis miring di akhir 8000 untuk menghapus /api):
        # proxy_pass http://backend:8000/; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}